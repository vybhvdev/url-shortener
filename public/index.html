<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>URL Shortener</title><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script></head>
<body><div class="container"><header><h1>🔗 URL Shortener</h1><p>Shorten links and track every click</p></header><div class="card"><h2>Create New Short Link</h2><div class="form-group"><input type="url" id="longUrlInput" placeholder="https://example.com/long/url"><button id="shortenBtn">Shorten</button></div><div id="resultMessage" class="message"></div></div><div class="card"><h2>📊 Your Links</h2><div id="linksList"><div class="loading">Loading...</div></div></div></div><div id="statsModal" class="modal"><div class="modal-content"><span class="close">&times;</span><div id="modalContent"><h2>Analytics</h2><div class="loading">Loading stats...</div></div></div></div><script src="script.js"></script></body></html>
